{% extends 'base.html' %}

{% block content %}

<style>

    #demo{
        margin-top: 150px;
        margin-bottom: 100px;
    }

</style>

<section class="container" id="demo">

    <div class="row">

        <!-- ORDER SUMMARY -->
        <div class="col-lg-8">

            <div class="card shadow p-4">

                <h3 class="mb-4">Order Summary</h3>

                {% for item in product_data %}

                <div class="d-flex align-items-center border-bottom pb-3 mb-3">

                    <img src="{{ item.image }}"
                         class="rounded"
                         width="100">

                    <div class="ms-3 flex-grow-1">

                        <h5 class="mb-1">

                            {{ item.name }}

                        </h5>

                        <p class="text-muted mb-1">

                            Quantity: {{ item.quantity }}

                        </p>

                        <p class="fw-bold mb-0">

                            ₹{{ item.total }}

                        </p>

                    </div>

                </div>

                {% endfor %}

            </div>

        </div>


        <!-- PRICE DETAILS -->
        <div class="col-lg-4">

            <div class="card shadow p-4">

                <h4 class="mb-4">Price Details</h4>

                <div class="d-flex justify-content-between mb-2">

                    <span>Subtotal</span>

                    <span>₹{{ subtotal }}</span>

                </div>

                <div class="d-flex justify-content-between mb-2">

                    <span>Shipping</span>

                    <span>₹{{ shipping }}</span>

                </div>

                <hr>

                <div class="d-flex justify-content-between fw-bold fs-5">

                    <span>Total</span>

                    <span>₹{{ grand_total }}</span>

                </div>

                <form method="POST" action="{% url 'order' %}">

                    {% csrf_token %}

                    <button class="btn btn-dark w-100 mt-4">

                        Place Order

                    </button>

                </form>

            </div>

        </div>

    </div>

</section>

{% endblock %}
